<section class="home">
  <div class="home-header">
    <h2 class="home-title">{{ title() }}</h2>
    <a class="home-create-link" [attr.href]="createRocketHref">{{ createRocketLabel }}</a>
  </div>
  <div class="rocket-list">
    @for (rocket of rockets(); track rocket.id) {
      <div
        app-rocket-card
        [rocket]="rocket"
        [rangeLabel]="rangeLabel"
        [capacityLabel]="capacityLabel"
        [seatsLabel]="seatsLabel"
      >
      </div>
    }
  </div>
</section>
