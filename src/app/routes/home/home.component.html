<section class="home">
  <h2 class="home-title">{{ title() }}</h2>
  <div class="rocket-list">
    @for (rocket of rockets(); track rocket.id) {
      <div
        app-rocket-card
        [rocket]="rocket"
        [rangeLabel]="rangeLabel"
        [capacityLabel]="capacityLabel"
        [seatsLabel]="seatsLabel"
      >
      </div>
    }
  </div>
</section>
